<!DOCTYPE html>
<html>
<head>
  <title>Smart Crop Advisory</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eaffea;
      padding: 20px;
    }

    h1 {
      color: green;
    }

    input, button {
      margin: 5px;
      padding: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    .box {
      background: white;
      padding: 15px;
      margin: 15px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
  </style>
</head>

<body>

<h1>🌾 Smart Crop Advisory</h1>

<div class="box">
  <h3>🌦 Weather</h3>
  <input id="city" placeholder="Enter city">
  <button onclick="getWeather()">Get Weather</button>
  <p id="weather"></p>
</div>

<div class="box">
  <h3>🧪 Soil Test</h3>
  <input id="n" placeholder="Nitrogen">
  <input id="p" placeholder="Phosphorus">
  <input id="k" placeholder="Potassium">
  <button onclick="getSoil()">Check Soil</button>
  <p id="soil"></p>
</div>

<div class="box">
  <h3>🌱 Crop Suggestion</h3>
  <button onclick="getCrop()">Suggest Crop</button>
  <p id="crop"></p>
</div>

<div class="box">
  <h3>📸 Disease Detection</h3>
  <input type="file">
  <button onclick="detectDisease()">Scan Crop</button>
  <p id="disease"></p>
</div>

<script>

// Fake Weather
function getWeather() {
  let city = document.getElementById("city").value;

  if(city === "") {
    document.getElementById("weather").innerText = "Enter city";
    return;
  }

  let temp = Math.floor(Math.random() * 15) + 25;

  document.getElementById("weather").innerText =
    city + ": " + temp + "°C, Sunny";
}

// Soil Logic
function getSoil() {
  let n = document.getElementById("n").value;
  let p = document.getElementById("p").value;
  let k = document.getElementById("k").value;

  let result = "";

  if (n < 50) result += "Add Urea. ";
  if (p < 30) result += "Add DAP. ";
  if (k < 30) result += "Add Potash. ";

  if (result === "") result = "Soil is healthy";

  document.getElementById("soil").innerText = result;
}

// Crop Suggestion
function getCrop() {
  let crops = ["Rice", "Wheat", "Maize", "Millets"];

  let randomCrop = crops[Math.floor(Math.random() * crops.length)];

  document.getElementById("crop").innerText =
    "Recommended Crop: " + randomCrop;
}

// Fake Disease Detection
function detectDisease() {
  let diseases = [
    "Leaf Spot - Use Neem Oil",
    "Blight - Use Fungicide",
    "Healthy Crop",
    "Powdery Mildew - Spray Sulfur"
  ];

  let result = diseases[Math.floor(Math.random() * diseases.length)];

  document.getElementById("disease").innerText = result;
}

</script>

</body>
</html>
